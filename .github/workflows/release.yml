name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the run triggered by the version-bump commit itself.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (or App token) able to bypass `master` branch protection.
          # Falls back to GITHUB_TOKEN if the secret is unset.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Determine version bump
        id: bump
        run: |
          range="${{ github.event.before }}..${{ github.sha }}"
          if [ -z "${{ github.event.before }}" ] || ! git rev-parse --quiet --verify "${{ github.event.before }}" >/dev/null; then
            range="HEAD~1..HEAD"
          fi
          log=$(git log --format=%B "$range" 2>/dev/null || git log -1 --format=%B)
          if echo "$log" | grep -qiE '(BREAKING CHANGE|!:)'; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$log" | grep -qiE '^feat(\(.+\))?:'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version (package.json + tauri.conf.json + Cargo.toml) and tag
        id: version
        run: |
          ver=$(npm version ${{ steps.bump.outputs.level }} --no-git-tag-version)
          ver=${ver#v}
          node -e "const f='crates/praetorium-tauri/tauri.conf.json',j=require('./'+f);j.version='$ver';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          # Bump the first `version = "x.y.z"` in [package] of all workspace Cargo.tomls.
          for toml in Cargo.toml crates/praetorium-core/Cargo.toml crates/praetorium-cli/Cargo.toml crates/praetorium-tauri/Cargo.toml; do
            sed -i -E '0,/^version = "[^"]+"/s//version = "'"$ver"'"/' "$toml"
          done
          # Keep Cargo.lock in sync so downstream builds don't fail on a dirty lockfile.
          cargo update -p praetorium --precise "$ver" 2>/dev/null || true
          cargo update -p praetorium-core --precise "$ver" 2>/dev/null || true
          cargo update -p praetorium-cli --precise "$ver" 2>/dev/null || true
          git add package.json package-lock.json crates/praetorium-tauri/tauri.conf.json \
            Cargo.toml crates/praetorium-core/Cargo.toml crates/praetorium-cli/Cargo.toml \
            crates/praetorium-tauri/Cargo.toml Cargo.lock crates/praetorium-tauri/Cargo.lock
          git commit -m "chore(release): v$ver"
          # Annotated tag: required for `git push --follow-tags` to actually
          # push the tag (lightweight tags are silently skipped).
          git tag -a "v$ver" -m "Release v$ver"
          git push --follow-tags origin master
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
          id=$(gh api "repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.tag }}" --jq .id)
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  build:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-2022
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libxdo-dev libssl-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.release.outputs.release_id }}
          tauriContext: crates/praetorium-tauri
          args: ${{ matrix.args }}
