name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the run triggered by the version-bump commit itself.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Determine version bump
        id: bump
        run: |
          range="${{ github.event.before }}..${{ github.sha }}"
          if [ -z "${{ github.event.before }}" ] || ! git rev-parse --quiet --verify "${{ github.event.before }}" >/dev/null; then
            range="HEAD~1..HEAD"
          fi
          log=$(git log --format=%B "$range" 2>/dev/null || git log -1 --format=%B)
          if echo "$log" | grep -qiE '(BREAKING CHANGE|!:)'; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$log" | grep -qiE '^feat(\(.+\))?:'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        id: version
        run: |
          new=$(npm version ${{ steps.bump.outputs.level }} -m "chore(release): %s")
          echo "tag=$new" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags origin master

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
