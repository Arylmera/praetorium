name: release-tauri

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: auto-tag on version bump
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.maybe-tag.outputs.tag }}
      tagged: ${{ steps.maybe-tag.outputs.tagged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - id: maybe-tag
        name: Tag if Cargo.toml version is new
        run: |
          ver=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          tag="v$ver"
          if [ -z "$ver" ]; then
            echo "could not parse version" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists on origin — skipping"
            echo "tagged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "tagged=true" >> "$GITHUB_OUTPUT"
          # Tags pushed via GITHUB_TOKEN do NOT trigger downstream workflow
          # runs, so the build/release jobs below chain off this job's
          # `tagged` output instead of waiting for the tag-push event.

  build:
    name: build (windows)
    needs: [tag]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/v')
        || github.event_name == 'workflow_dispatch'
        || needs.tag.outputs.tagged == 'true'
      )
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          save-if: ${{ startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build frontend bundle
        run: |
          npm ci
          npm run build

      - name: Install tauri-cli (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Tauri build
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: praetorium-windows
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    name: attach to GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-22.04
    if: |
      always() && needs.build.result == 'success' && (
        startsWith(github.ref, 'refs/tags/v')
        || needs.tag.outputs.tagged == 'true'
        || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
      )
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag || inputs.tag || github.ref_name }}
          files: dist/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
